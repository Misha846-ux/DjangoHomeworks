{% load static %}

<div>
    <h2>Products</h2>
    <table class="table">
        <thead>
            <tr>
                <th scope="col">Title</th>
                <th scope="col">Price</th>
            </tr>
        </thead>
        {% if products %}
        {% for product in products %}
        <tbody>
            <tr>
                <td>{{ product.title }}</td>
                <td>{{ product.price }}</td>
            </tr>
        </tbody>
        {% endfor %}
        {% else %}
        <div>No products available.</div>
        {% endif %}
    </table>
</div>
