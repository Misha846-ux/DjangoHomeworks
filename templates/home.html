{% extends 'layout.html' %}
{% load static %}
{% block title %}Главная{% endblock %}

{% block content %}

<h2>Добро пожаловать 
    <table class="table">
    <thead>
        <tr>
        <th scope="col">first Name</th>
        <th scope="col">Last Name</th>
        <th scope="col">Email</th>
        </tr>
    </thead>
    {%if posts%}
    
    {%for post in posts%}
    
    
    <tbody>
        <tr>
        <td>{{ post.name }}</td>
        <td>{{ post.secondName }}</td>
        <td>{{ post.email }}</td>
        <td><form id ="deleteForm">
            <input type="hidden" name="id" value="{{ post.id }}" />
            <button type="submit">
                Удалить
            </button>
        </form>
        </td>
        </tr>
    </tbody>
    
    {%endfor%}
    {%else%}
    <div>Гость</div>
    {%endif%}
    </table>
</h2>
<script src="{% static 'myapp/index.js' %}"></script>
{% endblock %}
